<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="https://microsoft.github.io/vscode-codicons/dist/codicon.css">
    <style>
        body {
            margin: 0;
            color: var(--vscode-editor-foreground);
            background: var(--vscode-editor-background);
            font-family: var(--vscode-font-family);
            font-size: var(--vscode-font-size);
        }

        .collection-name {
            margin-bottom: 10px;
            color: var(--vscode-descriptionForeground);
            padding: 12px 12px 0 12px;
            font-size: 1.1em;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .refresh-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0 2px;
            display: flex;
            align-items: center;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover {
            opacity: 1;
        }

        .codicon {
            font-size: 18px;
            color: var(--vscode-icon-foreground, var(--vscode-descriptionForeground));
            display: block;
        }

        .grid {
            border: 1px solid var(--vscode-panel-border);
            overflow: auto;
            margin: 0 12px 12px 12px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            border-right: 1px solid var(--vscode-panel-border);
            border-bottom: 1px solid var(--vscode-panel-border);
            padding: 4px 8px;
            text-align: left;
            white-space: nowrap;
        }

        th {
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 1;
            background: var(--vscode-editorGroupHeader-tabsBackground);
        }

        .row-number {
            width: 38px;
            text-align: center;
            color: var(--vscode-descriptionForeground);
            background: var(--vscode-sideBar-background);
        }

        th.row-number {
            background: var(--vscode-sideBar-background);
        }

        .empty {
            color: var(--vscode-descriptionForeground);
            padding: 12px;
        }

        td[data-readonly="true"] {
            background: var(--vscode-editorGutter-background, var(--vscode-sideBar-background));
            cursor: not-allowed;
            opacity: 0.8;
        }
    </style>
</head>

<body>
    <div class="collection-name">
        <span>Collection: <strong>{{COLLECTION_NAME}}</strong></span>
        <button class="refresh-btn" id="refresh-collection-btn" title="Refresh">
            <span class="codicon codicon-refresh"></span>
        </button>
    </div>
    <div class="grid">
        <table>
            <thead>
                <tr>
                    <th class="row-number"></th>{{TABLE_HEADER}}
                </tr>
            </thead>
            <tbody>
                {{TABLE_ROWS}}
            </tbody>
        </table>
    </div>
    <script>
        const vscode = acquireVsCodeApi();
        document.getElementById('refresh-collection-btn')?.addEventListener('click', () => {
            vscode.postMessage({ command: 'refreshCollection', collection: '{{COLLECTION_NAME_JSON}}' });
        });

        // Cell editing logic
        document.querySelectorAll('td[data-row][data-col]').forEach(td => {
            td.addEventListener('click', function (e) {
                // Don't allow editing of _id column
                if (td.getAttribute('data-readonly') === 'true') return;
                if (td.querySelector('input')) return; // already editing
                const oldValue = td.textContent;
                const dataType = td.getAttribute('data-type');
                const input = document.createElement('input');
                input.type = 'text';
                input.value = oldValue;
                input.style.width = '100%';
                input.style.boxSizing = 'border-box';
                td.textContent = '';
                td.appendChild(input);
                input.focus();
                input.select();

                // Handle Enter and Escape
                input.addEventListener('keydown', function (ev) {
                    if (ev.key === 'Enter') {
                        let newValue = input.value;
                        // Type-preserving conversion
                        if (dataType === 'number' && newValue !== '' && !isNaN(Number(newValue))) {
                            newValue = Number(newValue);
                        } else if (dataType === 'bson') {
                            newValue = { $oid: newValue };
                        } else if (dataType === 'guid') {
                            // Optionally validate GUID format here
                            newValue = newValue;
                        } else if (dataType === 'date') {
                            // Send as ISO string (LiteDB will interpret as DateTime)
                            newValue = newValue;
                        }
                        td.textContent = input.value;
                        // Send update message with _id
                        vscode.postMessage({
                            command: 'updateCell',
                            collection: '{{COLLECTION_NAME_JSON}}',
                            _id: td.getAttribute('data-id'),
                            column: td.getAttribute('data-col'),
                            value: newValue
                        });
                    } else if (ev.key === 'Escape') {
                        td.textContent = oldValue;
                    }
                });

                // Blur restores value
                input.addEventListener('blur', function () {
                    td.textContent = input.value;
                });
            });
        });
    </script>
</body>

</html>
